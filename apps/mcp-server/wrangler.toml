name = "manako-mcp-server"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "SESSION_KV"
id = "460779e9c02c4490bac5d604772c0d67"

[vars]
ENVIRONMENT = "development"
API_URL = "http://localhost:8787"

